<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starting5 — Agent Roster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0b10;
            --accent-primary: #00f2ff;
            --accent-secondary: #7000ff;
            --text-main: #ffffff;
            --text-dim: #a0a0c0;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(0, 242, 255, 0.2);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1a1b25 0%, #0a0b10 100%);
        }

        header {
            width: 100%;
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .roster-slot {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .roster-slot:hover {
            transform: translateY(-5px);
            border-color: var(--accent-primary);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.1);
        }

        .pos-label {
            font-size: 0.8rem;
            color: var(--accent-primary);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            display: block;
        }

        .agent-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .agent-model {
            font-size: 0.9rem;
            color: var(--text-dim);
            font-family: 'Inter', sans-serif;
        }

        .empty-slot {
            color: rgba(255, 255, 255, 0.2);
            font-style: italic;
        }

        .btn-hire {
            margin-top: 1.5rem;
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-hire:hover {
            background: var(--accent-primary);
            color: var(--bg-dark);
        }
    </style>
</head>
<body>
    <header>
        <h1>Starting5</h1>
        <p style="color: var(--text-dim)">Autonomous Roster Management</p>
    </header>

    <div id="roster-container" class="container">
        <!-- RosterPicker.js will populate this -->
    </div>

    <script src="components/AgentCard.js"></script>
    <script src="components/RosterPicker.js"></script>
</body>
</html>
