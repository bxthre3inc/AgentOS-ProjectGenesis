name: Build & Deploy Zo Server

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r AgentOS/requirements.txt
          # Add extra server-side deps if not in requirements
          pip install fastapi uvicorn aiosqlite httpx psutil

      - name: Run Server Logic Tests
        run: |
          echo "Verifying Mesh Kernel & Synchronization logic..."
          export PYTHONPATH=$PYTHONPATH:.
          python AgentOS/kernel/tests/benchmark_rqe.py
          python AgentOS/tests/test_corp_agents.py

      - name: Package for Zo Hosting
        run: |
          echo "Creating Zo Deployment Bundle..."
          # Zip AgentOS core, excluding native_app and node_modules
          zip -r agentos-server.zip AgentOS/ -x "AgentOS/native_app/*" "**/node_modules/*" "**/__pycache__/*" ".git/*"

      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentos-zo-server
          path: agentos-server.zip

  deploy-to-zo:
    needs: test-and-package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      
      - name: Trigger Zo Mesh Slot Update
        run: |
          echo "Deploying to Zo Hosted ID: zag-mesh-single-slot"
          # In a real scenario, this would call the Zo Hosting API
          # For now, we simulate the deployment success
          echo "Status: Success | Node: Online | Mesh: Symmetric"
